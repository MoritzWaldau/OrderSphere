name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege default. Individual jobs raise permissions only where needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build + Test + Coverage ──────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write          # dorny/test-reporter creates a check run
      pull-requests: write   # coverage comment/annotation on the PR
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache

      - name: Build
        run: dotnet build OrderSphere.slnx --no-restore --configuration Release

      # Container tests (Category=Container) boot the real Aspire graph over Docker and run in
      # the dedicated integration-containers job below — excluded here to keep this tier fast.
      - name: Test (with coverage; line-rate gate enforced below, not in .runsettings)
        run: >
          dotnet test OrderSphere.slnx --no-build --configuration Release
          --settings .runsettings
          --filter "Category!=Container"
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      - name: Restore .NET tools (reportgenerator)
        if: ${{ !cancelled() }}
        run: dotnet tool restore

      - name: Generate coverage report
        if: ${{ !cancelled() }}
        run: >
          dotnet tool run reportgenerator
          -reports:"**/TestResults/**/coverage.cobertura.xml"
          -targetdir:"./CoverageReport"
          -reporttypes:"Cobertura;MarkdownSummaryGithub"

      - name: Write coverage into the job summary
        if: ${{ !cancelled() }}
        run: cat ./CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish test results as a check
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ !cancelled() }}
        with:
          name: Test Results
          path: '**/*.trx'
          reporter: dotnet-trx

      - name: Upload artifacts (trx + coverage)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: test-and-coverage
          path: |
            ./TestResults/**/*.trx
            ./CoverageReport/**
          retention-days: 14

  # ── Software Bill of Materials (D5) ─────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache

      - name: Restore .NET tools (CycloneDX)
        run: dotnet tool restore

      - name: Generate CycloneDX SBOM
        run: >
          dotnet tool run dotnet-CycloneDX OrderSphere.slnx
          -o ./sbom -F Json -fn ordersphere.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: ./sbom/ordersphere.cdx.json
          retention-days: 90

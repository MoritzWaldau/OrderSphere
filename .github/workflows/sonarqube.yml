name: SonarQube Cloud

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  sonar:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required for accurate blame / new-code detection.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup JDK (required by the Sonar scanner)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache SonarQube scanner
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"MoritzWaldau_OrderSphere"
          /o:"moritzwaldau"
          /d:sonar.token="${SONAR_TOKEN}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.cobertura.reportsPaths="**/TestResults/**/coverage.cobertura.xml"
          /d:sonar.scanner.scanAll=false
          /d:sonar.coverage.exclusions="**/*"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build OrderSphere.slnx --no-restore --configuration Release

      - name: Test with coverage
        run: dotnet test --no-build --configuration Release --settings .runsettings --collect:"XPlat Code Coverage"

      - name: End Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

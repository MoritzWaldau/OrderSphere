name: Deploy OrderSphere (Staging)

# SCAFFOLD — Staging does not exist yet. Before first use:
#   1. Create the GitHub environment `staging` (optionally with Required Reviewers).
#   2. Set up a federated credential for `staging`.
#   3. Set the values below (location, resource group, Keycloak issuer).
#   4. Staging deploys only a tagged build (no rebuild from master).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (vX.Y.Z) to deploy to Staging'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/_azd-deploy.yml
    with:
      environment: staging
      azd-env-name: staging
      azure-location: northeurope
      resource-group: rg-staging
      keycloak-realm-authority: https://CHANGE-ME/realms/ordersphere
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      BFF_CLIENT_SECRET: ${{ secrets.BFF_CLIENT_SECRET }}
      ORDERING_WORKER_SECRET: ${{ secrets.ORDERING_WORKER_SECRET }}
      NOTIFICATION_WORKER_SECRET: ${{ secrets.NOTIFICATION_WORKER_SECRET }}
      PAYMENT_WORKER_SECRET: ${{ secrets.PAYMENT_WORKER_SECRET }}

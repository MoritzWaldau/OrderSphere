name: Security

# Secret-Scan (gitleaks) + Filesystem-/Misconfig-Scan (Trivy).
# Ergänzt CodeQL (SAST) und Dependency-Review (Abhängigkeiten).
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '27 4 * * 1'

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Secret-Scan ───────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0   # vollständige History für Commit-Scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # Für PR-Scans zwingend erforderlich.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Nur für Organisationen erforderlich; für persönliche Repos optional.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Filesystem-/Misconfig-Scan ────────────────────────────────────────────────
  trivy:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write   # SARIF-Upload in den Security-Tab
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Trivy (vuln + secret + misconfig)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          # Authentifizierte GitHub-Aufrufe beim Binary-/DB-Download → kein Rate-Limit.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # DB aus GHCR (stabiler als der Default), ebenfalls gegen Rate-Limits.
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          cache: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: ${{ !cancelled() && hashFiles('trivy-results.sarif') != '' }}
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

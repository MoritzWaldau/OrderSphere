name: _azd-deploy (reusable)

# Reusable azd deploy to Azure Container Apps. Encapsulates OIDC login,
# azd setup, environment configuration, provisioning parameters, and `azd up`.
# Called by deploy-staging.yml / deploy-prod.yml (and prospectively
# deploy-ordersphere.yml). Mirrors the logic proven in deploy-ordersphere.yml.
on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub environment (dev | staging | production)'
        required: true
        type: string
      azd-env-name:
        description: 'azd environment name'
        required: true
        type: string
      azure-location:
        required: true
        type: string
      resource-group:
        required: true
        type: string
      keycloak-realm-authority:
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      BFF_CLIENT_SECRET:
        required: true
      ORDERING_WORKER_SECRET:
        required: true
      NOTIFICATION_WORKER_SECRET:
        required: true
      PAYMENT_WORKER_SECRET:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 45
    concurrency:
      group: deploy-${{ inputs.azd-env-name }}
      cancel-in-progress: false
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          restore: 'false'

      - name: Install azd
        uses: Azure/setup-azd@634ad924cf8baef2257898ba5663be8d19f15aca # v2.3.0

      - name: Log in to Azure (OIDC federated)
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}" \
            --federated-credential-provider github

      - name: Configure azd environment
        run: |
          azd env new "${{ inputs.azd-env-name }}" \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --location "${{ inputs.azure-location }}"
          azd env set AZURE_RESOURCE_GROUP "${{ inputs.resource-group }}"

      - name: Write provisioning parameters
        env:
          KEYCLOAK_REALM_AUTHORITY: ${{ inputs.keycloak-realm-authority }}
          BFF_CLIENT_SECRET: ${{ secrets.BFF_CLIENT_SECRET }}
          ORDERING_WORKER_SECRET: ${{ secrets.ORDERING_WORKER_SECRET }}
          NOTIFICATION_WORKER_SECRET: ${{ secrets.NOTIFICATION_WORKER_SECRET }}
          PAYMENT_WORKER_SECRET: ${{ secrets.PAYMENT_WORKER_SECRET }}
        run: |
          jq -n \
            --arg authority "$KEYCLOAK_REALM_AUTHORITY" \
            --arg bff "$BFF_CLIENT_SECRET" \
            --arg ordering "$ORDERING_WORKER_SECRET" \
            --arg notification "$NOTIFICATION_WORKER_SECRET" \
            --arg payment "$PAYMENT_WORKER_SECRET" \
            '{infra:{parameters:{
               keycloak_realm_authority: $authority,
               payment_bypass_providers: "true",
               bff_client_secret: $bff,
               ordering_worker_secret: $ordering,
               notification_worker_secret: $notification,
               payment_worker_secret: $payment
            }}}' > ".azure/${{ inputs.azd-env-name }}/config.json"

      - name: Provision and deploy
        run: azd up --no-prompt

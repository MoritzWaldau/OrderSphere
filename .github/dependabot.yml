version: 2

updates:
  # ── NuGet: covers Central Package Management (Directory.Packages.props),
  #    all *.csproj, global.json AND .config/dotnet-tools.json. ─────────────────────
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      microsoft:
        patterns: ["Microsoft.*", "System.*"]
      aspire:
        patterns: ["Aspire.*"]
      opentelemetry:
        patterns: ["OpenTelemetry.*"]
      test:
        patterns:
          - "xunit*"
          - "*.Test.Sdk"
          - "Microsoft.NET.Test.Sdk"
          - "NSubstitute*"
          - "FluentAssertions"
          - "bunit"
          - "MockQueryable*"
          - "coverlet.*"
          - "ReportGenerator"
    commit-message:
      prefix: chore

  # ── GitHub Actions: keeps SHA pins in workflows + composite action up to date. ──
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: chore

  # ── Docker: Keycloak base image in the SSO deploy. ─────────────────────────────
  - package-ecosystem: docker
    directory: "/deploy/sso"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore

name: Vulnerable Packages

# Runs only when package manifests change — not on every push to master.
# dependency-review.yml catches new vulnerable deps on PRs; this job checks
# the full solution baseline including transitive packages.
on:
  push:
    branches: [master]
    paths:
      - 'Directory.Packages.props'
      - '**/*.csproj'
  pull_request:
    branches: [master]
    paths:
      - 'Directory.Packages.props'
      - '**/*.csproj'

permissions:
  contents: read

concurrency:
  group: vuln-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vuln-scan:
    name: Vulnerable Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache

      - name: Check for vulnerable packages (incl. transitive)
        shell: bash
        run: |
          set -euo pipefail

          # Advisories accepted as known-unfixable. Each entry must include the GHSA ID,
          # the reason no patch exists, and a revisit condition.
          #
          # GHSA-2m69-gcr7-jv3q — SQLitePCLRaw.lib.e_sqlite3 2.1.11 (High)
          #   No patched release exists; 2.1.11 is the current latest on NuGet (2026-06-19).
          #   SQLite is used only in test projects for in-process FK-constraint enforcement
          #   and EF Core ComplexProperty support, which the InMemory provider cannot cover.
          #   Revisit when a patched SQLitePCLRaw version ships.
          ACCEPTED_ADVISORIES="GHSA-2m69-gcr7-jv3q"

          report="$(dotnet list OrderSphere.slnx package --vulnerable --include-transitive 2>&1)"
          echo "$report"

          # Strip accepted advisories from the report before checking for failures.
          filtered="$report"
          for id in $ACCEPTED_ADVISORIES; do
            filtered="$(echo "$filtered" | grep -v "$id")"
          done

          # Fail on any advisory URL line that wasn't filtered out above.
          if echo "$filtered" | grep -q "github.com/advisories"; then
            echo "::error::Vulnerable NuGet packages found."
            exit 1
          fi

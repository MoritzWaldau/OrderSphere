name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege default. Individual jobs raise permissions only where needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build + Test + Coverage ──────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write          # dorny/test-reporter creates a check run
      pull-requests: write   # coverage comment/annotation on the PR
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache

      - name: Build
        run: dotnet build OrderSphere.slnx --no-restore --configuration Release

      # Container tests (Category=Container) boot the real Aspire graph over Docker and run in
      # the dedicated integration-containers job below — excluded here to keep this tier fast.
      - name: Test (with coverage; line-rate gate enforced below, not in .runsettings)
        run: >
          dotnet test OrderSphere.slnx --no-build --configuration Release
          --settings .runsettings
          --filter "Category!=Container"
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      - name: Restore .NET tools (reportgenerator)
        if: ${{ !cancelled() }}
        run: dotnet tool restore

      - name: Generate coverage report
        if: ${{ !cancelled() }}
        run: >
          dotnet tool run reportgenerator
          -reports:"**/TestResults/**/coverage.cobertura.xml"
          -targetdir:"./CoverageReport"
          -reporttypes:"Cobertura;MarkdownSummaryGithub"

      - name: Write coverage into the job summary
        if: ${{ !cancelled() }}
        run: cat ./CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      # Real, enforcing coverage gate. The collector's <Threshold> in
      # .runsettings does not fail the run, so the gate lives here.
      # Staging ladder toward the 60% goal — raise MIN_LINE as phases land:
      #   Phase 0: 40   Phase 1: 48   Phase 2: 50   Phase 3: 55   Phase 4: 58   → 60
      # Phase 4 (Catalog admin/internal/review endpoints + Ordering checkout/internal)
      # measured 58.8% line. The final ~1.2 points to 60% sit in the Blazor Web project
      # (the large remaining anchor) and the worker/processor loops. The gate is
      # line-rate; branch (~38%) is reported but not enforced.
      - name: Coverage gate (line-rate)
        if: ${{ !cancelled() }}
        env:
          MIN_LINE: "58"
        run: |
          python3 - <<'PY'
          import os, sys, xml.etree.ElementTree as ET
          rate = float(ET.parse("CoverageReport/Cobertura.xml").getroot().get("line-rate"))
          pct, floor = rate * 100, float(os.environ["MIN_LINE"])
          print(f"Line coverage: {pct:.1f}%  (gate: {floor:.0f}%)")
          if pct + 1e-9 < floor:
              sys.exit(f"::error::Line coverage {pct:.1f}% is below the {floor:.0f}% gate.")
          PY

      - name: Publish test results as a check
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ !cancelled() }}
        with:
          name: Test Results
          path: '**/*.trx'
          reporter: dotnet-trx

      - name: Upload artifacts (trx + coverage)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: test-and-coverage
          path: |
            ./TestResults/**/*.trx
            ./CoverageReport/**
          retention-days: 14

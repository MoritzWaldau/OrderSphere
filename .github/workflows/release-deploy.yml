name: Deploy OrderSphere

# Manual release + DEV deployment. Deliberately not triggered on merge (cost control).
# One run does three things, in order:
#   1. Write the SemVer into <VersionPrefix> in Directory.Build.props (single version source).
#   2. Commit that bump to master and create the annotated tag vX.Y.Z.
#   3. Provision + deploy the tagged revision to the Azure DEV environment via azd.
# See docs/github/branching.md and docs/deploy-ordersphere.md.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (SemVer MAJOR.MINOR.PATCH, e.g. 1.1.0 — no leading v)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-ordersphere-dev
  cancel-in-progress: false

jobs:
  # ── Version bump + tag ─────────────────────────────────────────────────────────
  release:
    name: Version & Tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # RELEASE_PAT is required: master is PR-protected, so the default GITHUB_TOKEN
      # cannot push the version-bump commit. The PAT owner must be on the branch
      # protection bypass list.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '${{ inputs.version }}' is not SemVer MAJOR.MINOR.PATCH."
            exit 1
          fi

      - name: Ensure tag does not already exist
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists. Pick a new version."
            exit 1
          fi

      - name: Bump <VersionPrefix> in Directory.Build.props
        run: |
          sed -i -E "s|<VersionPrefix>[0-9]+\.[0-9]+\.[0-9]+</VersionPrefix>|<VersionPrefix>${{ inputs.version }}</VersionPrefix>|" Directory.Build.props
          if ! grep -q "<VersionPrefix>${{ inputs.version }}</VersionPrefix>" Directory.Build.props; then
            echo "::error::Failed to update VersionPrefix in Directory.Build.props."
            exit 1
          fi

      - name: Commit and tag
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props
          git commit -m "chore(release): v${{ inputs.version }}"
          git tag -a "v${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin HEAD:master
          git push origin "v${{ inputs.version }}"
          echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"

  # ── Provision + deploy to Azure DEV ─────────────────────────────────────────────
  deploy:
    name: Provision & Deploy (DEV)
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # The OIDC federated credential on the azd service principal trusts the subject
    # repo:MoritzWaldau/OrderSphere:environment:dev — this environment name is mandatory.
    environment: dev
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: rg-ordersphere-dev
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout the released tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup .NET SDK (no restore; azd builds the containers)
        uses: ./.github/actions/setup-dotnet-cache
        with:
          restore: 'false'

      - name: Install azd
        uses: Azure/setup-azd@634ad924cf8baef2257898ba5663be8d19f15aca # v2.3.0

      - name: Log in to Azure (OIDC federated credentials)
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"

      - name: Reconstruct azd environment
        env:
          BFF_CLIENT_SECRET: ${{ secrets.BFF_CLIENT_SECRET }}
          ORDERING_WORKER_SECRET: ${{ secrets.ORDERING_WORKER_SECRET }}
          NOTIFICATION_WORKER_SECRET: ${{ secrets.NOTIFICATION_WORKER_SECRET }}
          PAYMENT_WORKER_SECRET: ${{ secrets.PAYMENT_WORKER_SECRET }}
        run: |
          azd env new "$AZURE_ENV_NAME" \
            --location "$AZURE_LOCATION" \
            --subscription "$AZURE_SUBSCRIPTION_ID"
          azd env set AZURE_RESOURCE_GROUP "$AZURE_RESOURCE_GROUP"
          # Seed the infra parameters azd would otherwise prompt for. The 4 client
          # secrets come from GitHub secrets (ephemeral, masked in logs); the two
          # non-secret parameters are fixed for DEV. Underscore key form matches azd.
          jq -n \
            --arg oidc "https://ordersphere-dev.eu.auth0.com/" \
            --arg bypass "true" \
            --arg bff "$BFF_CLIENT_SECRET" \
            --arg ordering "$ORDERING_WORKER_SECRET" \
            --arg notification "$NOTIFICATION_WORKER_SECRET" \
            --arg payment "$PAYMENT_WORKER_SECRET" \
            '{infra:{parameters:{
              oidc_authority:$oidc,
              payment_bypass_providers:$bypass,
              bff_client_secret:$bff,
              ordering_worker_secret:$ordering,
              notification_worker_secret:$notification,
              payment_worker_secret:$payment
            }}}' > ".azure/$AZURE_ENV_NAME/config.json"

      - name: Provision infrastructure
        run: azd provision --no-prompt

      - name: Deploy services
        run: azd deploy --no-prompt

name: Release

# Tag-driven (vX.Y.Z): produces an immutable, versioned release.
# - SBOM of the source state as a release asset
# - GitHub release with generated notes
# Building/pushing versioned container images runs via azd/ACR and is intended as
# a separate step (see the build-images job, currently disabled because the
# ACR coordinates are provided per environment via azd).
on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # create the release + assets
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Derive version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          artifact-name: ordersphere-sbom-${{ steps.version.outputs.version }}.spdx.json
          output-file: ordersphere-sbom-${{ steps.version.outputs.version }}.spdx.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "ordersphere-sbom-${{ steps.version.outputs.version }}.spdx.json"

  # ── Versioned container images (scaffold, disabled) ──────────────────────────
  # Enable once the ACR coordinates of the azd environment are fixed. Builds the
  # 12 Aspire projects as immutable images :vX.Y.Z and pushes them to the ACR.
  build-images:
    name: Build & push versioned images
    if: ${{ false }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          restore: 'false'

      - name: Install azd
        uses: Azure/setup-azd@634ad924cf8baef2257898ba5663be8d19f15aca # v2.3.0

      # TODO: azd auth login (OIDC) + `azd package` with image tag vX.Y.Z + push to ACR.
      #       Trivy scan of the tagged images before release.

name: Deploy OrderSphere (Production)

# SCAFFOLD — Production does not exist yet. Before first use:
#   1. Create the GitHub environment `production` with Required Reviewers (approval gate).
#   2. Set up a federated credential for `production`.
#   3. Set the values below (location, resource group, Keycloak issuer).
#   4. Production deploys only a tagged build that was previously verified in Staging
#      (no rebuild). Add a migration gate before rollout
#      (dotnet ef / EF bundle; then disable self-migrate in the services).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (vX.Y.Z) to deploy to Production'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/_azd-deploy.yml
    with:
      environment: production   # approval gate via environment protection
      azd-env-name: production
      azure-location: northeurope
      resource-group: rg-prod
      keycloak-realm-authority: https://CHANGE-ME/realms/ordersphere
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      BFF_CLIENT_SECRET: ${{ secrets.BFF_CLIENT_SECRET }}
      ORDERING_WORKER_SECRET: ${{ secrets.ORDERING_WORKER_SECRET }}
      NOTIFICATION_WORKER_SECRET: ${{ secrets.NOTIFICATION_WORKER_SECRET }}
      PAYMENT_WORKER_SECRET: ${{ secrets.PAYMENT_WORKER_SECRET }}

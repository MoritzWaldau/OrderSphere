name: SonarQube Cloud

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege: the analysis needs only read access to the code.
permissions:
  contents: read

# Cancel running analyses of the same ref as soon as a new push arrives.
concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history is required for accurate blame / new-code detection.
          fetch-depth: 0

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          restore: 'false'

      - name: Setup JDK (required by the Sonar scanner)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache SonarQube scanner
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Restore .NET tools (dotnet-sonarscanner from .config/dotnet-tools.json)
        run: dotnet tool restore

      - name: Begin Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"MoritzWaldau_OrderSphere"
          /o:"moritzwaldau"
          /d:sonar.token="${SONAR_TOKEN}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.cobertura.reportsPaths="**/TestResults/**/coverage.cobertura.xml"
          /d:sonar.scanner.scanAll=false
          /d:sonar.coverage.exclusions="**/*"

      - name: Restore dependencies
        run: dotnet restore OrderSphere.slnx

      - name: Build
        run: dotnet build OrderSphere.slnx --no-restore --configuration Release

      - name: Test with coverage
        run: dotnet test OrderSphere.slnx --no-build --configuration Release --settings .runsettings --collect:"XPlat Code Coverage"

      - name: End Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

# Azure Developer CLI (azd) configuration for OrderSphere.
#
# OrderSphere is a .NET Aspire application: the AppHost manifest is the single
# source of truth for the resource topology (Container Apps, PostgreSQL Flexible
# Server, Service Bus, Azure Managed Redis, Key Vault). azd reads that manifest
# at provision/deploy time and generates Bicep — there is no hand-written infra/
# folder. External ingress is limited to ordersphere-bff (WithExternalHttpEndpoints).
#
# Identity provider: Auth0 (tenant ordersphere-dev.eu.auth0.com). Not provisioned
# by azd — supplied via the oidc-authority parameter and four client secrets.
name: ordersphere
services:
  app:
    language: dotnet
    project: ./src/Hosting/OrderSphere.AppHost/OrderSphere.AppHost.csproj
    host: containerapp

# Azure AI Search (catalog hybrid search) is provisioned from the Aspire manifest and its
# data-plane roles (SearchService/SearchIndexData Contributor) are generated by azd. The
# catalog also calls the Foundry embedding deployment with managed identity, but Foundry is
# an external resource (not modelled by this azd project — same as the advisory service), so
# azd cannot generate that role. This hook grants the shared container-app managed identity
# "Cognitive Services OpenAI User" on the Foundry account after every provision. Idempotent.
#
# The shared managed identity's object id is resolved from MANAGED_IDENTITY_CLIENT_ID
# (an output reliably surfaced to hooks) via `az ad sp show` — azd does not export the
# principal/object id directly. Only the external Foundry scope must be set once per env:
#   azd env set AZURE_FOUNDRY_RESOURCE_ID "/subscriptions/.../resourceGroups/.../providers/Microsoft.CognitiveServices/accounts/<foundry>"
# Note: uses `powershell` (5.1) shell — this machine has no pwsh; the script is 5.1-compatible.
hooks:
  postprovision:
    posix:
      shell: sh
      run: |
        set -e
        if [ -z "$AZURE_FOUNDRY_RESOURCE_ID" ] || [ -z "$MANAGED_IDENTITY_CLIENT_ID" ]; then
          echo "Skipping Foundry role grant: AZURE_FOUNDRY_RESOURCE_ID or MANAGED_IDENTITY_CLIENT_ID not set."
          exit 0
        fi
        OBJECT_ID=$(az ad sp show --id "$MANAGED_IDENTITY_CLIENT_ID" --query id -o tsv)
        echo "Granting 'Cognitive Services OpenAI User' to $OBJECT_ID on Foundry..."
        az role assignment create \
          --assignee-object-id "$OBJECT_ID" \
          --assignee-principal-type ServicePrincipal \
          --role "Cognitive Services OpenAI User" \
          --scope "$AZURE_FOUNDRY_RESOURCE_ID" \
          --only-show-errors || true
    windows:
      shell: powershell
      run: |
        if (-not $env:AZURE_FOUNDRY_RESOURCE_ID -or -not $env:MANAGED_IDENTITY_CLIENT_ID) {
          Write-Host "Skipping Foundry role grant: AZURE_FOUNDRY_RESOURCE_ID or MANAGED_IDENTITY_CLIENT_ID not set."
          exit 0
        }
        $objectId = az ad sp show --id $env:MANAGED_IDENTITY_CLIENT_ID --query id -o tsv
        Write-Host "Granting 'Cognitive Services OpenAI User' to $objectId on Foundry..."
        az role assignment create `
          --assignee-object-id $objectId `
          --assignee-principal-type ServicePrincipal `
          --role "Cognitive Services OpenAI User" `
          --scope $env:AZURE_FOUNDRY_RESOURCE_ID `
          --only-show-errors
        if ($LASTEXITCODE -ne 0) { Write-Host "Role assignment already present or non-fatal error; continuing." }

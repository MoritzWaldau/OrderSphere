name: Release Drafter

# Pflegt fortlaufend einen Release-Entwurf aus gemergten PRs.
# Konfiguration: .github/release-drafter.yml (wird IMMER aus dem Default-Branch
# gelesen — daher nur auf push:master laufen lassen, nicht auf PRs).
on:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: release-drafter
  cancel-in-progress: false

jobs:
  draft:
    name: Update draft release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # Draft-Release schreiben
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: SSO Power (start/stop DEV)

# Manual cost control for the DEV Keycloak SSO environment.
#
#   stop  -> scale Keycloak to 0 replicas, then stop the PostgreSQL server.
#   start -> start PostgreSQL (wait until Ready), then scale Keycloak to 1.
#
# Order is deliberate: Keycloak depends on the database, so the database starts
# first / stops last. On-demand wake of both at once is NOT possible — a stopped
# Flexible Server has no auto-start — which is why this is an explicit toggle.
#
# No schedule by design: triggered on demand only. Reuses the same OIDC
# workload-identity login as deploy-sso.yml; no stored cloud secrets.
#
# What this does NOT stop (these are fixed monthly costs, unaffected by power state):
#   ACR Basic (~EUR 4.4), Postgres storage (~EUR 3.5), Private DNS zone, Key Vault.
# It removes the variable compute: Postgres B1ms compute + the always-on container.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Power action for the DEV SSO environment'
        type: choice
        required: true
        options:
          - start
          - stop

permissions:
  id-token: write   # required for azure/login OIDC
  contents: read

env:
  RESOURCE_GROUP: rg-sso-dev
  CONTAINER_APP: keycloak
  POSTGRES_SERVER: psql-ssodev
  REALM: ordersphere

concurrency:
  group: sso-power
  cancel-in-progress: false

jobs:
  power:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install containerapp CLI extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: Stop SSO (Keycloak then Postgres)
        if: ${{ inputs.action == 'stop' }}
        run: |
          set -euo pipefail
          echo "::group::Scaling Keycloak to 0 replicas"
          az containerapp update -g "$RESOURCE_GROUP" -n "$CONTAINER_APP" \
            --min-replicas 0 --only-show-errors -o none
          echo "::endgroup::"

          echo "::group::Stopping PostgreSQL ($POSTGRES_SERVER)"
          az postgres flexible-server stop \
            -g "$RESOURCE_GROUP" -n "$POSTGRES_SERVER" --only-show-errors
          echo "::endgroup::"

          echo "DEV SSO stopped. Variable compute billing is now ~zero."
          echo "Postgres scales back up automatically after 7 days if not started sooner."

      - name: Start SSO (Postgres then Keycloak)
        if: ${{ inputs.action == 'start' }}
        run: |
          set -euo pipefail
          echo "::group::Starting PostgreSQL ($POSTGRES_SERVER)"
          az postgres flexible-server start \
            -g "$RESOURCE_GROUP" -n "$POSTGRES_SERVER" --only-show-errors
          # Confirm the server reports Ready before bringing Keycloak up, so the
          # first start does not fail against an unreachable database.
          for i in $(seq 1 30); do
            state=$(az postgres flexible-server show \
              -g "$RESOURCE_GROUP" -n "$POSTGRES_SERVER" --query state -o tsv)
            echo "attempt $i: Postgres state = $state"
            [ "$state" = "Ready" ] && break
            sleep 10
          done
          echo "::endgroup::"

          echo "::group::Scaling Keycloak to 1 replica"
          az containerapp update -g "$RESOURCE_GROUP" -n "$CONTAINER_APP" \
            --min-replicas 1 --only-show-errors -o none
          echo "::endgroup::"

          echo "::group::Waiting for Keycloak readiness"
          fqdn=$(az containerapp show -g "$RESOURCE_GROUP" -n "$CONTAINER_APP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          url="https://$fqdn/realms/$REALM/.well-known/openid-configuration"
          ready=0
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$url" || true)
            echo "attempt $i: GET well-known = HTTP $code"
            if [ "$code" = "200" ]; then ready=1; break; fi
            sleep 10
          done
          echo "::endgroup::"

          if [ "$ready" = "1" ]; then
            echo "DEV SSO is up: https://$fqdn/realms/$REALM"
          else
            echo "::error::Keycloak did not become ready within the timeout."
            exit 1
          fi

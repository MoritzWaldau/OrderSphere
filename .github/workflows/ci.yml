name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege default. Individual jobs raise permissions only where needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build + Test + Coverage ──────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write          # dorny/test-reporter creates a check run
      pull-requests: write   # coverage comment/annotation on the PR
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache

      - name: Build
        run: dotnet build OrderSphere.slnx --no-restore --configuration Release

      - name: Test (with coverage; line-rate gate enforced below, not in .runsettings)
        run: >
          dotnet test OrderSphere.slnx --no-build --configuration Release
          --settings .runsettings
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      - name: Restore .NET tools (reportgenerator)
        if: ${{ !cancelled() }}
        run: dotnet tool restore

      - name: Generate coverage report
        if: ${{ !cancelled() }}
        run: >
          dotnet tool run reportgenerator
          -reports:"**/TestResults/**/coverage.cobertura.xml"
          -targetdir:"./CoverageReport"
          -reporttypes:"Cobertura;MarkdownSummaryGithub"

      - name: Write coverage into the job summary
        if: ${{ !cancelled() }}
        run: cat ./CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      # Real, enforcing coverage gate. The collector's <Threshold> in
      # .runsettings does not fail the run, so the gate lives here.
      # Staging ladder toward the 60% goal — raise MIN_LINE as phases land:
      #   Phase 0: 40   Phase 1: 48   Phase 2: 50   Phase 3: 55   → 60
      # Phase 3 (WebApplicationFactory API integration tests across the six request
      # services) measured 56.4% line. Branch coverage dipped to ~37% because booting
      # the full hosts pulled branchy startup/config wiring into the denominator; the
      # gate is line-rate, so this does not affect enforcement.
      - name: Coverage gate (line-rate)
        if: ${{ !cancelled() }}
        env:
          MIN_LINE: "55"
        run: |
          python3 - <<'PY'
          import os, sys, xml.etree.ElementTree as ET
          rate = float(ET.parse("CoverageReport/Cobertura.xml").getroot().get("line-rate"))
          pct, floor = rate * 100, float(os.environ["MIN_LINE"])
          print(f"Line coverage: {pct:.1f}%  (gate: {floor:.0f}%)")
          if pct + 1e-9 < floor:
              sys.exit(f"::error::Line coverage {pct:.1f}% is below the {floor:.0f}% gate.")
          PY

      - name: Publish test results as a check
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ !cancelled() }}
        with:
          name: Test Results
          path: '**/*.trx'
          reporter: dotnet-trx

      - name: Upload artifacts (trx + coverage)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: test-and-coverage
          path: |
            ./TestResults/**/*.trx
            ./CoverageReport/**
          retention-days: 14

  # ── SonarCloud Analysis ──────────────────────────────────────────────────────
  # Reuses the coverage artifact from build-test — no second test run.
  sonar:
    name: SonarCloud
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache

      - name: Setup JDK (required by the Sonar scanner)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache SonarQube scanner
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Restore .NET tools (dotnet-sonarscanner)
        run: dotnet tool restore

      - name: Download coverage artifact from build-test
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.1
        with:
          name: test-and-coverage

      - name: Begin Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"MoritzWaldau_OrderSphere"
          /o:"moritzwaldau"
          /d:sonar.token="${SONAR_TOKEN}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.cobertura.reportsPaths="CoverageReport/Cobertura.xml"
          /d:sonar.scanner.scanAll=false

      - name: Restore dependencies
        run: dotnet restore OrderSphere.slnx

      - name: Build
        run: dotnet build OrderSphere.slnx --no-restore --configuration Release

      - name: End Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"


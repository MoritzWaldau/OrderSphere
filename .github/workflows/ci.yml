name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege Default. Einzelne Jobs erhöhen Rechte nur, wo nötig.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Style-Gate (blockierend) ─────────────────────────────────────────────────
  # EnforceCodeStyleInBuild ist false; daher Format hier explizit prüfen.
  # Generierte EF-Migrationen sind ausgenommen.
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache

      - name: Verify formatting (generierte Migrationen ausgenommen)
        run: dotnet format OrderSphere.slnx --no-restore --verify-no-changes --severity warn --exclude "**/Migrations/**"

  # ── Build + Test + Coverage ──────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write          # dorny/test-reporter erstellt einen Check-Run
      pull-requests: write   # Coverage-Kommentar/Annotation am PR
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache

      - name: Build
        run: dotnet build OrderSphere.slnx --no-restore --configuration Release

      - name: Test (mit Coverage; 70%-Branch-Gate aus .runsettings)
        run: >
          dotnet test OrderSphere.slnx --no-build --configuration Release
          --settings .runsettings
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      - name: Restore .NET tools (reportgenerator)
        if: ${{ !cancelled() }}
        run: dotnet tool restore

      - name: Coverage-Report erzeugen
        if: ${{ !cancelled() }}
        run: >
          dotnet tool run reportgenerator
          -reports:"**/TestResults/**/coverage.cobertura.xml"
          -targetdir:"./CoverageReport"
          -reporttypes:"Cobertura;MarkdownSummaryGithub"

      - name: Coverage in Job-Summary schreiben
        if: ${{ !cancelled() }}
        run: cat ./CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Testergebnisse als Check veröffentlichen
        uses: dorny/test-reporter@890a17cecf52a379fc869ab770a71657660be727 # v2.1.0
        if: ${{ !cancelled() }}
        with:
          name: Test Results
          path: '**/*.trx'
          reporter: dotnet-trx

      - name: Artefakte hochladen (trx + Coverage)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: test-and-coverage
          path: |
            ./TestResults/**/*.trx
            ./CoverageReport/**
          retention-days: 14

  # ── Vulnerable NuGet-Pakete ──────────────────────────────────────────────────
  vuln-scan:
    name: Vulnerable Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache

      - name: Auf verwundbare Pakete prüfen (inkl. transitiv)
        shell: bash
        run: |
          set -euo pipefail
          report="$(dotnet list OrderSphere.slnx package --vulnerable --include-transitive 2>&1)"
          echo "$report"
          if echo "$report" | grep -q "has the following vulnerable packages"; then
            echo "::error::Verwundbare NuGet-Pakete gefunden."
            exit 1
          fi

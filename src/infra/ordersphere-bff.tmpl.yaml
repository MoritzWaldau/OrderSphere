api-version: 2024-02-02-preview
location: {{ .Env.AZURE_LOCATION }}
identity:
  type: UserAssigned
  userAssignedIdentities:
    ? "{{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}"
    : {}
properties:
  environmentId: {{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_ID }}
  configuration:
    activeRevisionsMode: single
    runtime:
      dotnet:
        autoConfigureDataProtection: true
    ingress:
      external: false
      targetPort: {{ targetPortOrDefault 8080 }}
      transport: http
      allowInsecure: true
    registries:
      - server: {{ .Env.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
        identity: {{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}
    secrets:
      - name: connectionstrings--azure-service-bus
        value: '{{ .Env.AZURE_SERVICE_BUS_SERVICEBUSENDPOINT }}'
      - name: connectionstrings--redis
        value: '{{ .Env.REDIS_CONNECTIONSTRING }}'
      - name: keycloak--clientsecret
        value: '{{ securedParameter "bff_client_secret" }}'
  template:
    containers:
      - image: {{ .Image }}
        name: ordersphere-bff
        env:
          - name: AZURE_CLIENT_ID
            value: {{ .Env.MANAGED_IDENTITY_CLIENT_ID }}
          - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
            value: "true"
          - name: AZURE_SERVICE_BUS_HOST
            value: '{{ .Env.AZURE_SERVICE_BUS_SERVICEBUSHOSTNAME }}'
          - name: AZURE_SERVICE_BUS_URI
            value: '{{ .Env.AZURE_SERVICE_BUS_SERVICEBUSENDPOINT }}'
          - name: HTTP_PORTS
            value: '{{ targetPortOrDefault 0 }}'
          - name: Keycloak__Authority
            value: '{{ parameter "keycloak_realm_authority" }}'
          - name: Keycloak__ClientId
            value: web-bff
          - name: ORDERSPHERE_APIGATEWAY_HTTP
            value: http://ordersphere-apigateway.internal.{{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN }}
          - name: ORDERSPHERE_APIGATEWAY_HTTPS
            value: https://ordersphere-apigateway.internal.{{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN }}
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY
            value: in_memory
          - name: REDIS_HOST
            value: '{{ .Env.REDIS_HOSTNAME }}'
          - name: REDIS_PORT
            value: "10000"
          - name: REDIS_URI
            value: rediss://{{ .Env.REDIS_HOSTNAME }}:10000
          - name: services__ordersphere-apigateway__http__0
            value: http://ordersphere-apigateway.internal.{{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN }}
          - name: services__ordersphere-apigateway__https__0
            value: https://ordersphere-apigateway.internal.{{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN }}
          - name: ConnectionStrings__azure-service-bus
            secretRef: connectionstrings--azure-service-bus
          - name: ConnectionStrings__redis
            secretRef: connectionstrings--redis
          - name: Keycloak__ClientSecret
            secretRef: keycloak--clientsecret
    scale:
      minReplicas: 1
tags:
  azd-service-name: ordersphere-bff
  aspire-resource-name: ordersphere-bff

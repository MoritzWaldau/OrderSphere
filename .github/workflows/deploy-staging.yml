name: Deploy OrderSphere (Staging)

# GERÜST — Staging existiert noch nicht. Vor der ersten Nutzung:
#   1. GitHub-Environment `staging` anlegen (ggf. Required Reviewers).
#   2. Federated Credential für `staging` einrichten.
#   3. Werte unten (Location, Resource Group, Keycloak-Issuer) setzen.
#   4. Staging deployt ausschließlich einen getaggten Stand (kein Rebuild aus master).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release-Tag (vX.Y.Z), der nach Staging soll'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/_azd-deploy.yml
    with:
      environment: staging
      azd-env-name: staging
      azure-location: northeurope
      resource-group: rg-staging
      keycloak-realm-authority: https://CHANGE-ME/realms/ordersphere
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      BFF_CLIENT_SECRET: ${{ secrets.BFF_CLIENT_SECRET }}
      ORDERING_WORKER_SECRET: ${{ secrets.ORDERING_WORKER_SECRET }}
      NOTIFICATION_WORKER_SECRET: ${{ secrets.NOTIFICATION_WORKER_SECRET }}
      PAYMENT_WORKER_SECRET: ${{ secrets.PAYMENT_WORKER_SECRET }}

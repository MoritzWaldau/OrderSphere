name: Release

# Tag-getrieben (vX.Y.Z): erzeugt ein immutables, versioniertes Release.
# - SBOM des Quellstands als Release-Asset
# - GitHub Release mit generierten Notes
# Das Bauen/Pushen versionierter Container-Images läuft über azd/ACR und ist als
# separater Schritt vorgesehen (siehe build-images-Job, derzeit deaktiviert, da die
# ACR-Koordinaten umgebungsspezifisch über azd bereitgestellt werden).
on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # Release + Assets anlegen
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Version aus Tag ableiten
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: SBOM erzeugen (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          artifact-name: ordersphere-sbom-${{ steps.version.outputs.version }}.spdx.json
          output-file: ordersphere-sbom-${{ steps.version.outputs.version }}.spdx.json

      - name: GitHub Release erstellen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "ordersphere-sbom-${{ steps.version.outputs.version }}.spdx.json"

  # ── Versionierte Container-Images (Gerüst, deaktiviert) ───────────────────────
  # Aktivieren, sobald die ACR-Koordinaten der azd-Umgebung feststehen. Baut die
  # 12 Aspire-Projekte als immutable Images :vX.Y.Z und pusht in die ACR.
  build-images:
    name: Build & push versioned images
    if: ${{ false }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          restore: 'false'

      - name: Install azd
        uses: Azure/setup-azd@634ad924cf8baef2257898ba5663be8d19f15aca # v2.3.0

      # TODO: azd auth login (OIDC) + `azd package` mit Image-Tag vX.Y.Z + Push in ACR.
      #       Trivy-Scan der getaggten Images vor der Freigabe.

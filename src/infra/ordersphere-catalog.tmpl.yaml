api-version: 2024-02-02-preview
location: {{ .Env.AZURE_LOCATION }}
identity:
  type: UserAssigned
  userAssignedIdentities:
    ? "{{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}"
    : {}
properties:
  environmentId: {{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_ID }}
  configuration:
    activeRevisionsMode: single
    runtime:
      dotnet:
        autoConfigureDataProtection: true
    ingress:
      external: false
      targetPort: {{ targetPortOrDefault 8080 }}
      transport: http
      allowInsecure: true
    registries:
      - server: {{ .Env.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
        identity: {{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}
    secrets:
      - name: connectionstrings--catalog-db
        value: '{{ .Env.POSTGRES_CONNECTIONSTRING }};Database=catalog-db'
      - name: connectionstrings--redis
        value: '{{ .Env.REDIS_CONNECTIONSTRING }}'
  template:
    containers:
      - image: {{ .Image }}
        name: ordersphere-catalog
        env:
          - name: AZURE_CLIENT_ID
            value: {{ .Env.MANAGED_IDENTITY_CLIENT_ID }}
          - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
            value: "true"
          - name: CATALOG_DB_DATABASENAME
            value: catalog-db
          - name: CATALOG_DB_HOST
            value: '{{ .Env.POSTGRES_HOSTNAME }}'
          - name: CATALOG_DB_JDBCCONNECTIONSTRING
            value: jdbc:postgresql://{{ .Env.POSTGRES_HOSTNAME }}/catalog-db?sslmode=require&authenticationPluginClassName=com.azure.identity.extensions.jdbc.postgresql.AzurePostgresqlAuthenticationPlugin
          - name: CATALOG_DB_PORT
            value: "5432"
          - name: CATALOG_DB_URI
            value: postgresql://{{ .Env.POSTGRES_HOSTNAME }}/catalog-db
          - name: HTTP_PORTS
            value: '{{ targetPortOrDefault 0 }}'
          - name: Keycloak__Audience
            value: catalog-api
          - name: Keycloak__Authority
            value: '{{ parameter "keycloak_realm_authority" }}'
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY
            value: in_memory
          - name: REDIS_HOST
            value: '{{ .Env.REDIS_HOSTNAME }}'
          - name: REDIS_PORT
            value: "10000"
          - name: REDIS_URI
            value: rediss://{{ .Env.REDIS_HOSTNAME }}:10000
          - name: ConnectionStrings__catalog-db
            secretRef: connectionstrings--catalog-db
          - name: ConnectionStrings__redis
            secretRef: connectionstrings--redis
    scale:
      minReplicas: 1
tags:
  azd-service-name: ordersphere-catalog
  aspire-resource-name: ordersphere-catalog

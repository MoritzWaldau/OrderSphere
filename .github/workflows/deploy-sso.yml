name: Deploy SSO (Keycloak)

# Independent deployment of the central Keycloak SSO provider to Azure DEV.
# Decoupled from the OrderSphere application deploy: its own resource group,
# its own lifecycle, triggered manually. Authenticates via OIDC workload
# identity federation — no stored cloud secrets.
#
# Only runs when SSO assets change, or on demand.
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'deploy/sso/**'
      - 'contracts/keycloak/ordersphere-realm.json'
      - '.github/workflows/deploy-sso.yml'

permissions:
  id-token: write   # required for azure/login OIDC
  contents: read

concurrency:
  group: deploy-sso-dev
  cancel-in-progress: false

env:
  RESOURCE_GROUP: rg-sso-dev
  LOCATION: northeurope
  NAME_PREFIX: ssodev
  # Origin of the OrderSphere BFF, baked into the realm at image build time.
  # Empty = leave the realm at localhost; add the BFF redirect URI in the admin
  # console (or set this and rebuild) once the BFF's Azure URL is known.
  BFF_BASE_URL: ''
  # Issuer hostname. Empty = use the Container Apps default FQDN (no domain needed).
  # Set to a custom hostname only when you have a domain (see dev.bicepparam).
  SSO_HOSTNAME: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 45
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: az group create -n "$RESOURCE_GROUP" -l "$LOCATION" --tags workload=ordersphere-sso environment=dev

      - name: Ensure container registry (idempotent, needed before image build)
        run: |
          az acr create -n "${NAME_PREFIX}acr" -g "$RESOURCE_GROUP" \
            --sku Basic --admin-enabled false --location "$LOCATION" --only-show-errors

      - name: Stage realm into build context
        run: |
          mkdir -p deploy/sso/realm
          cp contracts/keycloak/ordersphere-realm.json deploy/sso/realm/ordersphere-realm.json

      - name: Build & push Keycloak image
        id: image
        run: |
          TAG="${GITHUB_SHA::8}"
          IMAGE="${NAME_PREFIX}acr.azurecr.io/keycloak:${TAG}"
          az acr build -r "${NAME_PREFIX}acr" \
            -f deploy/sso/Dockerfile \
            --build-arg BFF_BASE_URL="$BFF_BASE_URL" \
            -t "keycloak:${TAG}" \
            deploy/sso
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            -g "$RESOURCE_GROUP" \
            -f deploy/sso/infra/main.bicep \
            -p deploy/sso/infra/params/dev.bicepparam \
            -p keycloakImage="${{ steps.image.outputs.image }}" \
               ssoHostname="$SSO_HOSTNAME" \
               postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
               keycloakAdminPassword="${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}"

      - name: Output deployment results
        run: |
          az deployment group show -g "$RESOURCE_GROUP" -n main \
            --query "properties.outputs" -o json

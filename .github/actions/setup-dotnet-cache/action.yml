name: Setup .NET with NuGet cache
description: >
  Sets up the .NET SDK pinned via global.json and caches the global
  NuGet package folder. The cache key is based on Directory.Packages.props (Central
  Package Management — the single version source) and global.json. Optional
  restore of the solution.

inputs:
  restore:
    description: 'Run dotnet restore of the solution (true/false)'
    required: false
    default: 'true'
  solution:
    description: 'Solution/project path for the restore'
    required: false
    default: 'OrderSphere.slnx'

runs:
  using: composite
  steps:
    - name: Setup .NET SDK (version from global.json)
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
      with:
        global-json-file: global.json

    - name: Cache NuGet packages
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', 'global.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      if: ${{ inputs.restore == 'true' }}
      shell: bash
      run: dotnet restore ${{ inputs.solution }}

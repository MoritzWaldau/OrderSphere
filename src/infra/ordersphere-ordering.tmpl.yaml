api-version: 2024-02-02-preview
location: {{ .Env.AZURE_LOCATION }}
identity:
  type: UserAssigned
  userAssignedIdentities:
    ? "{{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}"
    : {}
properties:
  environmentId: {{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_ID }}
  configuration:
    activeRevisionsMode: single
    runtime:
      dotnet:
        autoConfigureDataProtection: true
    ingress:
      external: false
      targetPort: {{ targetPortOrDefault 8080 }}
      transport: http
      allowInsecure: true
    registries:
      - server: {{ .Env.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
        identity: {{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}
    secrets:
      - name: connectionstrings--azure-service-bus
        value: '{{ .Env.AZURE_SERVICE_BUS_SERVICEBUSENDPOINT }}'
      - name: connectionstrings--ordering-db
        value: '{{ .Env.POSTGRES_CONNECTIONSTRING }};Database=ordering-db'
      - name: connectionstrings--redis
        value: '{{ .Env.REDIS_CONNECTIONSTRING }}'
      - name: keycloak--clientsecret
        value: '{{ securedParameter "ordering_worker_secret" }}'
  template:
    containers:
      - image: {{ .Image }}
        name: ordersphere-ordering
        env:
          - name: AZURE_CLIENT_ID
            value: {{ .Env.MANAGED_IDENTITY_CLIENT_ID }}
          - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
            value: "true"
          - name: AZURE_SERVICE_BUS_HOST
            value: '{{ .Env.AZURE_SERVICE_BUS_SERVICEBUSHOSTNAME }}'
          - name: AZURE_SERVICE_BUS_URI
            value: '{{ .Env.AZURE_SERVICE_BUS_SERVICEBUSENDPOINT }}'
          - name: HTTP_PORTS
            value: '{{ targetPortOrDefault 0 }}'
          - name: Keycloak__Audience
            value: ordering-api
          - name: Keycloak__Authority
            value: '{{ parameter "keycloak_realm_authority" }}'
          - name: Keycloak__ClientId
            value: ordering-worker
          - name: ORDERING_DB_DATABASENAME
            value: ordering-db
          - name: ORDERING_DB_HOST
            value: '{{ .Env.POSTGRES_HOSTNAME }}'
          - name: ORDERING_DB_JDBCCONNECTIONSTRING
            value: jdbc:postgresql://{{ .Env.POSTGRES_HOSTNAME }}/ordering-db?sslmode=require&authenticationPluginClassName=com.azure.identity.extensions.jdbc.postgresql.AzurePostgresqlAuthenticationPlugin
          - name: ORDERING_DB_PORT
            value: "5432"
          - name: ORDERING_DB_URI
            value: postgresql://{{ .Env.POSTGRES_HOSTNAME }}/ordering-db
          - name: ORDERSPHERE_BASKET_HTTP
            value: http://ordersphere-basket.internal.{{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN }}
          - name: ORDERSPHERE_BASKET_HTTPS
            value: https://ordersphere-basket.internal.{{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN }}
          - name: ORDERSPHERE_CATALOG_HTTP
            value: http://ordersphere-catalog.internal.{{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN }}
          - name: ORDERSPHERE_CATALOG_HTTPS
            value: https://ordersphere-catalog.internal.{{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN }}
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY
            value: in_memory
          - name: REDIS_HOST
            value: '{{ .Env.REDIS_HOSTNAME }}'
          - name: REDIS_PORT
            value: "10000"
          - name: REDIS_URI
            value: rediss://{{ .Env.REDIS_HOSTNAME }}:10000
          - name: services__ordersphere-basket__http__0
            value: http://ordersphere-basket.internal.{{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN }}
          - name: services__ordersphere-basket__https__0
            value: https://ordersphere-basket.internal.{{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN }}
          - name: services__ordersphere-catalog__http__0
            value: http://ordersphere-catalog.internal.{{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN }}
          - name: services__ordersphere-catalog__https__0
            value: https://ordersphere-catalog.internal.{{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN }}
          - name: ConnectionStrings__azure-service-bus
            secretRef: connectionstrings--azure-service-bus
          - name: ConnectionStrings__ordering-db
            secretRef: connectionstrings--ordering-db
          - name: ConnectionStrings__redis
            secretRef: connectionstrings--redis
          - name: Keycloak__ClientSecret
            secretRef: keycloak--clientsecret
    scale:
      minReplicas: 1
tags:
  azd-service-name: ordersphere-ordering
  aspire-resource-name: ordersphere-ordering

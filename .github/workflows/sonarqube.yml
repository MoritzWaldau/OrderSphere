name: SonarQube Cloud

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege: Analyse braucht nur Lesezugriff auf den Code.
permissions:
  contents: read

# Laufende Analysen desselben Refs abbrechen, sobald ein neuer Push kommt.
concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history is required for accurate blame / new-code detection.
          fetch-depth: 0

      - name: Setup .NET + NuGet cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          restore: 'false'

      - name: Setup JDK (required by the Sonar scanner)
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache SonarQube scanner
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Restore .NET tools (dotnet-sonarscanner aus .config/dotnet-tools.json)
        run: dotnet tool restore

      - name: Begin Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"MoritzWaldau_OrderSphere"
          /o:"moritzwaldau"
          /d:sonar.token="${SONAR_TOKEN}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.cobertura.reportsPaths="**/TestResults/**/coverage.cobertura.xml"
          /d:sonar.scanner.scanAll=false
          /d:sonar.coverage.exclusions="**/*"

      - name: Restore dependencies
        run: dotnet restore OrderSphere.slnx

      - name: Build
        run: dotnet build OrderSphere.slnx --no-restore --configuration Release

      - name: Test with coverage
        run: dotnet test OrderSphere.slnx --no-build --configuration Release --settings .runsettings --collect:"XPlat Code Coverage"

      - name: End Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

name: PR Title Lint

# Erzwingt Conventional-Commit-Präfixe im PR-Titel. Beim Squash-Merge wird der
# PR-Titel zur Commit-Nachricht auf master — daher hier das Gate.
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Validate PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            docs
            style
            test
            chore
            ci
            build
            perf
            revert

api-version: 2024-02-02-preview
location: {{ .Env.AZURE_LOCATION }}
identity:
  type: UserAssigned
  userAssignedIdentities:
    ? "{{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}"
    : {}
properties:
  environmentId: {{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_ID }}
  configuration:
    activeRevisionsMode: single
    runtime:
      dotnet:
        autoConfigureDataProtection: true
    ingress:
      external: false
      targetPort: {{ targetPortOrDefault 8080 }}
      transport: http
      allowInsecure: true
    registries:
      - server: {{ .Env.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
        identity: {{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}
    secrets:
      - name: connectionstrings--userprofile-db
        value: '{{ .Env.POSTGRES_CONNECTIONSTRING }};Database=userprofile-db'
  template:
    containers:
      - image: {{ .Image }}
        name: ordersphere-userprofile
        env:
          - name: AZURE_CLIENT_ID
            value: {{ .Env.MANAGED_IDENTITY_CLIENT_ID }}
          - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
            value: "true"
          - name: HTTP_PORTS
            value: '{{ targetPortOrDefault 0 }}'
          - name: Keycloak__Audience
            value: userprofile-api
          - name: Keycloak__Authority
            value: '{{ parameter "keycloak_realm_authority" }}'
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY
            value: in_memory
          - name: USERPROFILE_DB_DATABASENAME
            value: userprofile-db
          - name: USERPROFILE_DB_HOST
            value: '{{ .Env.POSTGRES_HOSTNAME }}'
          - name: USERPROFILE_DB_JDBCCONNECTIONSTRING
            value: jdbc:postgresql://{{ .Env.POSTGRES_HOSTNAME }}/userprofile-db?sslmode=require&authenticationPluginClassName=com.azure.identity.extensions.jdbc.postgresql.AzurePostgresqlAuthenticationPlugin
          - name: USERPROFILE_DB_PORT
            value: "5432"
          - name: USERPROFILE_DB_URI
            value: postgresql://{{ .Env.POSTGRES_HOSTNAME }}/userprofile-db
          - name: ConnectionStrings__userprofile-db
            secretRef: connectionstrings--userprofile-db
    scale:
      minReplicas: 1
tags:
  azd-service-name: ordersphere-userprofile
  aspire-resource-name: ordersphere-userprofile

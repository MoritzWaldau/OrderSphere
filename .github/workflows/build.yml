name: Build & Test

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --settings .runsettings --collect:"XPlat Code Coverage"

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install azd
        uses: Azure/setup-azd@v2.0.0

      - name: Log in with Azure (OIDC)
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider "github" \
            --tenant-id "$AZURE_TENANT_ID"
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}

      - name: Deploy to Azure Container Apps
        run: azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}

      - name: Azure CLI login (for smoke test)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Smoke test — BFF health endpoint
        run: |
          RESOURCE_GROUP="rg-${{ vars.AZURE_ENV_NAME }}"
          BFF_FQDN=$(az containerapp show \
            --name ordersphere-bff \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "BFF endpoint: https://${BFF_FQDN}"
          for i in {1..6}; do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 20 "https://${BFF_FQDN}/health/live")
            echo "Attempt ${i}: HTTP ${STATUS}"
            [ "$STATUS" = "200" ] && break
            sleep 10
          done
          [ "$STATUS" = "200" ] || { echo "BFF /health/live did not return 200 after retries"; exit 1; }

      - name: Smoke test — Container Apps running state
        run: |
          RESOURCE_GROUP="rg-${{ vars.AZURE_ENV_NAME }}"
          FAILED=0
          for APP in ordersphere-bff ordersphere-apigateway ordersphere-catalog \
                     ordersphere-basket ordersphere-ordering ordersphere-ordering-worker \
                     ordersphere-payment ordersphere-payment-worker ordersphere-userprofile \
                     ordersphere-webhooks ordersphere-webhooks-worker ordersphere-notification-worker; do
            STATE=$(az containerapp revision list \
              --name "$APP" \
              --resource-group "$RESOURCE_GROUP" \
              --query "[0].properties.runningState" \
              --output tsv 2>/dev/null || echo "unknown")
            echo "$APP: $STATE"
            [ "$STATE" = "Running" ] || FAILED=1
          done
          [ "$FAILED" = "0" ] || { echo "One or more Container Apps are not in Running state"; exit 1; }
